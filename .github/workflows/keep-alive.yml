name: Keep Pivot Devs Demo Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping-site:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping live site health endpoint
        run: |
          curl -fsS --retry 3 --retry-delay 10 https://pivot-devs-demo.onrender.com/api/health
