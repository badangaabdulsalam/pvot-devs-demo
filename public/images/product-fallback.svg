<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Product image fallback</title>
  <desc id="desc">Stylized fallback image for product cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08131b"/>
      <stop offset="50%" stop-color="#123b46"/>
      <stop offset="100%" stop-color="#2a1a0b"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4ff36"/>
      <stop offset="100%" stop-color="#1ff1ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <g opacity="0.18">
    <circle cx="250" cy="250" r="180" fill="#ff7a2f"/>
    <circle cx="980" cy="320" r="220" fill="#1ff1ff"/>
    <circle cx="880" cy="980" r="200" fill="#d4ff36"/>
  </g>
  <circle cx="600" cy="560" r="250" fill="none" stroke="url(#ring)" stroke-width="28"/>
  <rect x="455" y="430" width="290" height="240" rx="30" fill="none" stroke="#f4f6f8" stroke-width="20"/>
  <circle cx="555" cy="520" r="36" fill="#f4f6f8"/>
  <path d="M480 640 L580 560 L660 620 L740 540" fill="none" stroke="#f4f6f8" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="600" y="860" text-anchor="middle" fill="#f4f6f8" font-family="'Segoe UI', Arial, sans-serif" font-size="62" font-weight="700" letter-spacing="2">
    Pivot Devs Demo
  </text>
  <text x="600" y="930" text-anchor="middle" fill="#d7dde2" font-family="'Segoe UI', Arial, sans-serif" font-size="36" letter-spacing="1.5">
    image unavailable, fallback loaded
  </text>
</svg>
